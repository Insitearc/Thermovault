# Sample Nginx site config for Next.js (replace placeholders)
# Place this in /etc/nginx/sites-available/your-site and symlink to sites-enabled

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name example.com www.example.com; # REPLACE with your domain

  # Optional: serve ACME challenges directly
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/letsencrypt;
    default_type "text/plain";
  }

  # Proxy any Next.js internals and app pages to Node
  location /_next/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_cache_bypass $http_upgrade;
  }

  # Public static (optional) - serve directly if you host public files separately
  location /public/ {
    alias /var/www/your-app/public/; # REPLACE
    try_files $uri =404;
  }

  # Fallback: let Next handle all other routes (SSR, API, dynamic pages)
  location / {
    try_files $uri $uri/ @next;
  }

  location @next {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_cache_bypass $http_upgrade;
    proxy_buffering off;
  }

  access_log /var/log/nginx/thermovault.access.log;
  error_log /var/log/nginx/thermovault.error.log warn;
}
